# GPS fusion configuration
quality_thresholds:
  excellent_hdop: 1.0
  high_hdop: 2.0
  medium_hdop: 5.0

covariance:
  excellent: [0.05, 0.05, 0.10]
  high:      [0.10, 0.10, 0.20]
  medium:    [1.00, 1.00, 2.00]
  low:       [10.0, 10.0, 20.0]

state_machine:
  consecutive_outliers_to_degraded: 3
  consecutive_outliers_to_lost: 5
  consecutive_valid_to_tracking: 5

jump_detection:
  enabled: true
  max_jump_meters: 5.0
  max_velocity_mps: 30.0

consistency_check:
  enabled: true
  chi2_threshold: 11.345      # chi2(3, 0.99)
  mahalanobis_threshold: 3.37  # sqrt(chi2)
