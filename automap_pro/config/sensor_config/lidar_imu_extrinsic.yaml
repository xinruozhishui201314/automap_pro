# LiDAR-IMU extrinsic calibration
# Calibrate with FAST-LIVO2 or LI-Init
T_lidar_imu:
  translation:   # [x, y, z] in meters
    - 0.0
    - 0.0
    - 0.0
  rotation_quat: # [qw, qx, qy, qz]
    - 1.0
    - 0.0
    - 0.0
    - 0.0
  rotation_rpy:  # [roll, pitch, yaw] degrees (for reference only)
    - 0.0
    - 0.0
    - 0.0
