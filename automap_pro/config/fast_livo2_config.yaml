# Fast-LIVO2 / ESIKF configuration
esikf:
  max_iterations: 5
  tolerance: 1.0e-6
  point_to_plane:
    min_neighbors: 5
    planarity_threshold: 0.1

imu_noise:
  gyro_noise:       1.0e-3    # rad/s/sqrt(Hz)
  accel_noise:      1.0e-2    # m/s^2/sqrt(Hz)
  gyro_bias_noise:  1.0e-5
  accel_bias_noise: 1.0e-4

local_map:
  voxel_size: 0.2
  max_points_per_voxel: 20
  max_voxels: 200000

extrinsic:
  # LiDAR-IMU: identity by default (calibrate with kalibr)
  T_lidar_imu:
    translation: [0.0, 0.0, 0.0]
    rotation: [1.0, 0.0, 0.0, 0.0]  # qw qx qy qz
