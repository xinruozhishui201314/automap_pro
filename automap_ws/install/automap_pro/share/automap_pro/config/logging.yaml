# AutoMap Pro 日志配置文件

# 日志级别: TRACE, DEBUG, INFO, WARN, ERROR, FATAL
log_level: INFO

# 日志文件路径
log_file: "/tmp/automap_pro/automap_pro.log"

# 日志滚动配置
rotation:
  max_size_mb: 100
  max_files: 10
  max_age_days: 30

# 日志采样配置（用于高频日志）
sampling_rates:
  "imu_callback": 0.01        # 1% 采样
  "lidar_callback": 0.05      # 5% 采样
  "gps_callback": 0.1         # 10% 采样
  "preintegration": 0.1        # 10% 采样

# 性能监控配置
performance:
  enable: true
  report_interval_sec: 10.0
  log_slow_threshold_ms: 100.0  # 慢操作阈值
  track_memory: true
  track_cpu: false

# 控制台日志格式
console:
  colored: true
  pattern: "[%Y-%m-%d %H:%M:%S.%e] [%^%l%$] [%n] %v"

# 文件日志格式
file:
  json_format: true  # 使用JSON格式便于解析
  pattern: "%v"

# 组件特定配置
components:
  SensorManager:
    level: INFO
  ImuProcessor:
    level: DEBUG
  LidarProcessor:
    level: DEBUG
  GPSProcessor:
    level: INFO
  LoopDetector:
    level: INFO
  Optimizer:
    level: INFO

# 告警配置
alerts:
  enable: true
  rules:
    - pattern: "ERROR"
      level: FATAL
      action: "log"
    - pattern: "Optimization.*failed"
      level: WARN
      action: "log"
