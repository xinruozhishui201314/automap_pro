# ══════════════════════════════════════════════════════════════════════════════
# AutoMap-Pro v2.0 系统配置文件
# ══════════════════════════════════════════════════════════════════════════════

# ── 系统全局 ──────────────────────────────────────────────────────────────────
system:
  name: "AutoMap-Pro"
  output_dir: "/data/automap_output"
  num_threads: 8
  log_level: "INFO"          # DEBUG | INFO | WARN | ERROR

# ── 传感器接口 ────────────────────────────────────────────────────────────────
sensor:
  lidar:
    topic: "/os1_cloud_node1/points"   # 或 /livox/lidar，按实际修改
    type: "OUSTER"                      # OUSTER | LIVOX | VELODYNE | HESAI
    frame_id: "os_lidar"
  imu:
    topic: "/imu/imu"
    frame_id: "imu"
    frequency: 400.0
  gps:
    enabled: false                      # 建图初期设 false，GPS好后改 true 或运行时通过 service 触发
    topic: "/gps/fix"
    frame_id: "gps"

# ── FAST-LIVO2 前端 ───────────────────────────────────────────────────────────
frontend:
  # Composable Node 模式（零拷贝）
  use_composable_node: true
  odom_topic:   "/aft_mapped_to_init"
  cloud_topic:  "/cloud_registered"
  kf_info_topic: "/fast_livo/keyframe_info"

# ── 关键帧选取 ────────────────────────────────────────────────────────────────
keyframe:
  min_translation:   1.0    # 米，最小平移距离触发
  min_rotation_deg: 10.0    # 度，最小旋转角触发
  max_interval:      2.0    # 秒，最长间隔强制插入
  max_esikf_cov_norm: 1000.0  # ESIKF协方差范数阈值（超过→自适应降低KF阈值）

# ── 子图管理（MS-Mapping 增量建图参数）──────────────────────────────────────────
submap:
  max_keyframes:  100       # 单子图最大关键帧数
  max_spatial_m:  100.0     # 单子图最大空间范围（米）
  max_temporal_s:  60.0     # 单子图最大时间跨度（秒）
  match_resolution:  0.4    # 用于回环匹配的点云降采样分辨率（米）
  merge_resolution:  0.1    # 子图合并点云降采样分辨率（米）

# ── GPS 延迟对齐 ───────────────────────────────────────────────────────────────
gps:
  # 对齐触发条件
  align_min_points:    50      # 最少 GPS-LiDAR 时间对应对
  align_min_distance_m: 30.0   # LiDAR 轨迹总长度阈值（米）
  quality_threshold_hdop: 2.0  # GPS 质量阈值（HDOP ≤ 2.0 = HIGH）
  align_rmse_threshold_m: 1.5  # SVD 对齐结果 RMSE 接受阈值（米）
  good_samples_needed: 30      # 连续高质量 GPS 帧数触发对齐
  
  # 对齐后 GPS 因子
  add_constraints_on_align: true   # 对齐成功后批量添加历史 GPS 因子
  factor_interval_m: 5.0           # 每隔 5m 添加一个 GPS 因子（避免过密）

# ── 回环检测 ───────────────────────────────────────────────────────────────────
loop_closure:
  overlap_threshold: 0.30      # OverlapTransformer 余弦相似度阈值
  top_k:             5         # 候选子图数量
  min_temporal_gap_s: 30.0     # 同 session 内最小时间间隔（避免与近期帧匹配）
  min_submap_gap:    3         # 同 session 内最小子图间隔
  gps_search_radius_m: 200.0  # GPS 半径过滤（双方有 GPS 时才使用）
  worker_threads:    2         # 描述子计算 Worker 线程数

  # OverlapTransformer
  overlap_transformer:
    model_path: ""             # TorchScript .pt 模型路径
                               # 生成方式：python OT_libtorch/gen_libtorch_model.py
                               # 生成后路径示例：/data/models/overlapTransformer.pt
    proj_H:    64              # Range image 高度（64 for KITTI/OS1-128, 32 for Haomo）
    proj_W:   900              # Range image 宽度（保持 900）
    fov_up:    3.0             # 上视场角（度）
    fov_down: -25.0            # 下视场角（度）
    max_range: 50.0            # 最大有效距离（米）
    descriptor_dim: 256        # 描述子维度（固定 256）

  # TEASER++（鲁棒点云配准）
  teaser:
    noise_bound:      0.1      # TEASER++ 噪声上界（米）
    cbar2:            1.0      # 最大旋转误差因子
    voxel_size:       0.4      # 用于 TEASER 的点云降采样（米）
    min_inlier_ratio: 0.30     # 最小内点率阈值
    max_rmse_m:       0.3      # 最大 RMSE 阈值（米）
    icp_refine:       true     # 是否在 TEASER 后做 ICP 精配准

# ── 后端优化 ───────────────────────────────────────────────────────────────────
backend:
  # iSAM2 实时增量优化
  isam2:
    relinearize_threshold: 0.01    # 重线性化阈值（越小越精确，越慢）
    relinearize_skip:       1      # 每隔几次 update 才检查重线性化
    enable_relinearization: true

  # HBA 全局优化（低频触发）
  hba:
    total_layer_num:  3            # 分层数（3层：KF→Submap→Global）
    thread_num:       8            # 并行线程数
    trigger_every_n_submaps: 10   # 每 N 个子图冻结时触发一次 HBA
    trigger_on_loop:  false        # 是否在回环检测时触发（开销大，建议 false）
    trigger_on_finish: true        # 建图结束时触发最终 HBA
    data_path: "/tmp/hba_data"     # 临时数据目录（HBA Bridge 文件 I/O 备用）

# ── 地图输出 ───────────────────────────────────────────────────────────────────
map:
  voxel_size:        0.1      # 最终地图体素大小（米）
  statistical_filter: true    # 是否使用统计滤波去除噪声

# ── 多会话建图（增量建图） ─────────────────────────────────────────────────────
session:
  multi_session:  false       # 是否启用多会话模式
  session_dir:    ""          # 当前 session 保存目录
  previous_session_dirs: []   # 历史 session 目录列表（回环检测时加载）
  # 示例（多会话）：
  # previous_session_dirs:
  #   - "/data/automap_output/session_1234567890"
  #   - "/data/automap_output/session_9876543210"
